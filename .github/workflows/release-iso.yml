name: Build ReviveOS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: reviveos
      IMAGE_TAG: latest
      RELEASE_TAG: latest
      OUTPUT_DIR: output
      BIB_IMAGE: quay.io/centos-bootc/bootc-image-builder:latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build container
        run: |
          sudo podman build -t localhost/${IMAGE_NAME}:${IMAGE_TAG} .

      - name: Prepare output dir
        run: mkdir -p ${OUTPUT_DIR}

      - name: Generate ISO config
        run: |
          sed "s|__IMAGE_REF__|localhost/${IMAGE_NAME}:${IMAGE_TAG}|g" \
            disk_config/iso.toml > iso.toml

      - name: Build ISO
        run: |
          sudo podman run --rm --privileged \
            -v $(pwd)/iso.toml:/config.toml:ro \
            -v $(pwd)/${OUTPUT_DIR}:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            ${BIB_IMAGE} \
            --type iso \
            --rootfs=btrfs \
            localhost/${IMAGE_NAME}:${IMAGE_TAG}

      - name: Split files >1GB
        run: |
          cd ${OUTPUT_DIR}
          for f in *; do
            size=$(stat -c%s "$f")
            if [ "$size" -gt 1073741824 ]; then
              split -b 1000m -d "$f" "$f.part-"
              rm "$f"
            fi
          done

      - name: Create release if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view ${RELEASE_TAG} >/dev/null 2>&1 || \
          gh release create ${RELEASE_TAG} --title "ReviveOS ${RELEASE_TAG}"

      - name: Upload release files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${RELEASE_TAG} ${OUTPUT_DIR}/* --clobber