name: Build Image

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: reviveos
      IMAGE_TAG: latest
      DISK_TYPE: iso
      OUTPUT_DIR: output
      RELEASE_TAG: latest
      BIB_IMAGE: quay.io/centos-bootc/bootc-image-builder:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build container image
        run: |
          sudo podman build -t localhost/${IMAGE_NAME}:${IMAGE_TAG} .

      - name: Create output directory
        run: mkdir -p ${OUTPUT_DIR}

      - name: Build disk image
        run: |
          sudo podman run --rm --privileged \
            -v $(pwd)/${OUTPUT_DIR}:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            ${BIB_IMAGE} \
            --type ${DISK_TYPE} \
            localhost/${IMAGE_NAME}:${IMAGE_TAG}

      - name: Split files >1GB
        run: |
          cd ${OUTPUT_DIR}
          for f in *; do
            size=$(stat -c%s "$f")
            if [ "$size" -gt 1073741824 ]; then
              split -b 1000m -d "$f" "$f.part-"
              rm "$f"
            fi
          done

      - name: Create release if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view ${RELEASE_TAG} >/dev/null 2>&1 || \
          gh release create ${RELEASE_TAG} --title "Release ${RELEASE_TAG}"

      - name: Upload files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${RELEASE_TAG} ${OUTPUT_DIR}/* --clobber